<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Permisos Linux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Calculadora de Permisos</h2>

    <label>Ingrese el número de permisos:</label>
    <input type="text" id="permisoInput" placeholder="Ej: 755" maxlength="3">

    <div class="select-group">
        <label>Permiso usuario:</label>
        <select id="usuario"></select>
    </div>

    <div class="select-group">
        <label>Permiso grupo:</label>
        <select id="grupo"></select>
    </div>

    <div class="select-group">
        <label>Permiso otros:</label>
        <select id="otros"></select>
    </div>

    <button id="limpiarBtn">Limpiar</button>
</div>

<script src="script.js"></script>
</body>
</html>
